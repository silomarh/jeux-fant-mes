<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>👻 FANTÔMES — Jeux de réflexes</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050508;
            --accent-mots: #bf5af2;
            --accent-clavier: #0a84ff;
            --success: #30d158;
            --text: #ffffff;
            --muted: #48484a;
            --card-bg: rgba(255,255,255,0.03);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Share Tech Mono', monospace;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        .bg-halo {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            pointer-events: none;
            z-index: 0;
        }
        .halo-purple {
            width: 500px; height: 500px;
            background: radial-gradient(circle, rgba(191,90,242,0.12) 0%, transparent 70%);
            top: -100px; left: -100px;
            animation: drift-a 8s ease-in-out infinite alternate;
        }
        .halo-blue {
            width: 500px; height: 500px;
            background: radial-gradient(circle, rgba(10,132,255,0.12) 0%, transparent 70%);
            bottom: -100px; right: -100px;
            animation: drift-b 9s ease-in-out infinite alternate;
        }
        @keyframes drift-a {
            from { transform: translate(0,0); }
            to   { transform: translate(40px, 30px); }
        }
        @keyframes drift-b {
            from { transform: translate(0,0); }
            to   { transform: translate(-30px, -40px); }
        }

        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 1;
            opacity: 0.4;
        }

        .container {
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 24px 16px;
            width: 100%;
            max-width: 520px;
        }

        .header {
            text-align: center;
            margin-bottom: 48px;
            animation: fade-in 0.6s ease both;
        }

        .ghost-main {
            font-size: 3.5rem;
            display: block;
            margin-bottom: 8px;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50%       { transform: translateY(-8px); }
        }

        .title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: clamp(3rem, 12vw, 5rem);
            letter-spacing: 0.1em;
            line-height: 1;
            background: linear-gradient(135deg, #fff 0%, #aaa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .tagline {
            margin-top: 10px;
            font-size: 0.72rem;
            color: var(--muted);
            letter-spacing: 0.25em;
            text-transform: uppercase;
        }

        .cards {
            display: flex;
            flex-direction: column;
            gap: 16px;
            width: 100%;
        }

        @media (min-width: 480px) {
            .cards { flex-direction: row; }
        }

        .card {
            flex: 1;
            background: var(--card-bg);
            border-radius: 16px;
            padding: 28px 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            text-decoration: none;
            color: inherit;
            border: 1px solid rgba(255,255,255,0.06);
            position: relative;
            overflow: hidden;
            transition: transform 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
            animation: fade-in 0.6s ease both;
        }

        .card:nth-child(1) { animation-delay: 0.1s; }
        .card:nth-child(2) { animation-delay: 0.2s; }

        @keyframes fade-in {
            from { opacity: 0; transform: translateY(16px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .card-mots:hover {
            border-color: rgba(191,90,242,0.4);
            box-shadow: 0 0 40px rgba(191,90,242,0.12), 0 8px 32px rgba(0,0,0,0.4);
            transform: translateY(-4px);
        }

        .card-clavier:hover {
            border-color: rgba(10,132,255,0.4);
            box-shadow: 0 0 40px rgba(10,132,255,0.12), 0 8px 32px rgba(0,0,0,0.4);
            transform: translateY(-4px);
        }

        .card::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 16px;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        .card-mots::before {
            background: radial-gradient(ellipse at 50% 0%, rgba(191,90,242,0.08) 0%, transparent 70%);
        }
        .card-clavier::before {
            background: radial-gradient(ellipse at 50% 0%, rgba(10,132,255,0.08) 0%, transparent 70%);
        }
        .card:hover::before { opacity: 1; }

        .card-logo {
            width: 72px;
            height: 72px;
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 16px;
            position: relative;
            z-index: 1;
        }

        .card-mots .card-logo {
            background: rgba(191,90,242,0.12);
            border: 1px solid rgba(191,90,242,0.25);
        }

        .card-clavier .card-logo {
            background: rgba(10,132,255,0.12);
            border: 1px solid rgba(10,132,255,0.25);
        }

        .card-name {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.6rem;
            letter-spacing: 0.08em;
            margin-bottom: 8px;
            position: relative;
            z-index: 1;
        }

        .card-mots .card-name   { color: var(--accent-mots); }
        .card-clavier .card-name { color: var(--accent-clavier); }

        .card-desc {
            font-size: 0.7rem;
            color: #888;
            letter-spacing: 0.1em;
            line-height: 1.7;
            margin-bottom: 24px;
            position: relative;
            z-index: 1;
        }

        .card-btn {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1rem;
            letter-spacing: 0.15em;
            padding: 10px 32px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            position: relative;
            z-index: 1;
            transition: opacity 0.15s, transform 0.1s, box-shadow 0.2s;
        }

        .card-btn:hover { opacity: 0.9; }
        .card-btn:active { transform: scale(0.95); }

        .card-mots .card-btn {
            background: var(--accent-mots);
            color: #fff;
            box-shadow: 0 0 24px rgba(191,90,242,0.35);
        }

        .card-clavier .card-btn {
            background: var(--accent-clavier);
            color: #fff;
            box-shadow: 0 0 24px rgba(10,132,255,0.35);
        }

        .badge {
            position: absolute;
            top: 14px;
            right: 14px;
            font-size: 0.58rem;
            letter-spacing: 0.15em;
            padding: 3px 8px;
            border-radius: 4px;
            background: rgba(48,209,88,0.12);
            border: 1px solid rgba(48,209,88,0.3);
            color: var(--success);
            z-index: 1;
        }

        .footer {
            margin-top: 40px;
            font-size: 0.6rem;
            color: #2a2a2a;
            letter-spacing: 0.2em;
            text-align: center;
            animation: fade-in 0.8s ease 0.4s both;
        }
    </style>
</head>
<body>

<div class="bg-halo halo-purple"></div>
<div class="bg-halo halo-blue"></div>

<div class="container">

    <div class="header">
        <span class="ghost-main">👻</span>
        <div class="title">FANTÔMES</div>
        <div class="tagline">Jeux de mémoire &amp; réflexes</div>
    </div>

    <div class="cards">

        <!-- MOTS FANTÔMES -->
        <a class="card card-mots" href="./mots/">
            <div class="card-logo">
                <svg width="42" height="42" viewBox="0 0 42 42" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <!-- Ondes sonores gauche -->
                    <path d="M5 21 Q7 15 9 21 Q11 27 13 21" stroke="#bf5af2" stroke-width="1.8" stroke-linecap="round" fill="none" opacity="0.45"/>
                    <!-- Ondes sonores droite -->
                    <path d="M29 21 Q31 15 33 21 Q35 27 37 21" stroke="#bf5af2" stroke-width="1.8" stroke-linecap="round" fill="none" opacity="0.45"/>
                    <!-- Corps fantôme centré -->
                    <path d="M15 24 Q15 14 21 14 Q27 14 27 24 L27 30 Q24.5 27.5 22 30 Q21 31 20 30 Q17.5 27.5 15 30 Z" fill="#bf5af2"/>
                    <!-- Yeux -->
                    <circle cx="18.5" cy="20" r="1.4" fill="#050508"/>
                    <circle cx="23.5" cy="20" r="1.4" fill="#050508"/>
                    <!-- Reflets yeux -->
                    <circle cx="19"   cy="19.4" r="0.5" fill="rgba(255,255,255,0.6)"/>
                    <circle cx="24"   cy="19.4" r="0.5" fill="rgba(255,255,255,0.6)"/>
                </svg>
            </div>
            <div class="card-name">MOTS FANTÔMES</div>
            <div class="card-desc">
                Un mot se cache<br>
                dans la phrase.<br>
                Sauras-tu l'entendre ?
            </div>
            <button class="card-btn">JOUER</button>
        </a>

        <!-- CLAVIER FANTÔME -->
        <a class="card card-clavier" href="./clavier/">
            <div class="badge">NOUVEAU</div>
            <div class="card-logo">
                <svg width="42" height="42" viewBox="0 0 42 42" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <!-- Fond clavier -->
                    <rect x="3" y="22" width="36" height="16" rx="4" fill="#0a84ff" opacity="0.1" stroke="#0a84ff" stroke-width="1" stroke-opacity="0.35"/>
                    <!-- Touches rangée 1 -->
                    <rect x="6"  y="25" width="5" height="4" rx="1.2" fill="#0a84ff" opacity="0.55"/>
                    <rect x="13" y="25" width="5" height="4" rx="1.2" fill="#0a84ff" opacity="0.55"/>
                    <rect x="20" y="25" width="5" height="4" rx="1.2" fill="#0a84ff" opacity="0.55"/>
                    <rect x="27" y="25" width="5" height="4" rx="1.2" fill="#0a84ff" opacity="0.55"/>
                    <!-- Touches rangée 2 -->
                    <rect x="9"  y="31" width="5" height="4" rx="1.2" fill="#0a84ff" opacity="0.3"/>
                    <rect x="16" y="31" width="5" height="4" rx="1.2" fill="#0a84ff" opacity="0.3"/>
                    <rect x="23" y="31" width="5" height="4" rx="1.2" fill="#0a84ff" opacity="0.3"/>
                    <!-- Fantôme assis sur le clavier -->
                    <path d="M16 22 Q16 12 21 12 Q26 12 26 22 L26 26 Q24 24 22 26 Q21 27 20 26 Q18 24 16 26 Z" fill="#0a84ff"/>
                    <!-- Yeux -->
                    <circle cx="18.8" cy="18" r="1.3" fill="#050508"/>
                    <circle cx="23.2" cy="18" r="1.3" fill="#050508"/>
                    <!-- Reflets -->
                    <circle cx="19.3" cy="17.5" r="0.45" fill="rgba(255,255,255,0.6)"/>
                    <circle cx="23.7" cy="17.5" r="0.45" fill="rgba(255,255,255,0.6)"/>
                </svg>
            </div>
            <div class="card-name">CLAVIER FANTÔME</div>
            <div class="card-desc">
                Les touches ont disparu.<br>
                Tape de mémoire.<br>
                Bats le chrono.
            </div>
            <button class="card-btn">JOUER</button>
        </a>

    </div>

    <div class="footer">FANTÔMES.FR — 2025</div>

</div>

</body>
</html>
